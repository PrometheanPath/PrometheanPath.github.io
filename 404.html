<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self'; connect-src 'none'; frame-src 'none';">
  <title>Page Not Found – The Promethean Path</title>
  <link rel="icon" href="animated-favicon.gif" type="image/gif">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07101c;
      color: #edf2f8;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: rgba(237,242,248,0.5);
      text-decoration: none;
      margin-bottom: 3rem;
      display: block;
    }
    .code {
      font-size: 6rem;
      font-weight: 700;
      color: rgba(237,242,248,0.08);
      line-height: 1;
      margin-bottom: 1.5rem;
      font-family: Georgia, serif;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: rgba(237,242,248,0.55);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      background: transparent;
      border: 1px solid rgba(237,242,248,0.3);
      color: #edf2f8;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn:hover { border-color: #edf2f8; }
  </style>
</head>
<body>
  <a href="index.html" class="logo">Promethean Path</a>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you are looking for does not exist or has been moved.</p>
  <a href="index.html" class="btn">Back to home</a>
</body>
</html>
